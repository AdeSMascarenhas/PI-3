{% load static %}
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-5 py-4 flex justify-between items-center flex-wrap">
        <div class="text-2xl font-bold text-indigo-700 tracking-tight">
            <a href="{% url 'home' %}">📖 Alexandria</a>
        </div>
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="{% url 'home' %}" class="hover:text-indigo-600 transition-smooth">Início</a>
            <a href="{% url 'explorar' %}" class="hover:text-indigo-600 transition-smooth">Explorar</a>
            <a href="{% url 'como-funciona' %}" class="hover:text-indigo-600 transition-smooth">Como Funciona</a>
            <a href="{% url 'comunidade' %}" class="hover:text-indigo-600 transition-smooth">Comunidade</a>
        </div>
        <div class="hidden md:block">
            {% if user.is_authenticated %}
                <a href="{% url 'perfil' %}" class="text-indigo-600 px-4 py-2 rounded-full font-medium">{{ user.nome }}</a>
                <a href="{% url 'logout' %}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-full ml-2">Sair</a>
            {% else %}
                <a href="{% url 'login' %}" class="bg-indigo-600 text-white px-5 py-2 rounded-full font-medium shadow hover:bg-indigo-700 transition-smooth">Entrar</a>
            {% endif %}
        </div>
        <div class="md:hidden">
            <button id="menu-btn" class="text-gray-600 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </div>
    <div id="mobile-menu" class="md:hidden hidden bg-white px-5 pb-4 pt-2 space-y-3 shadow-inner">
        <a href="{% url 'home' %}" class="block text-gray-700 hover:text-indigo-600 py-1">Início</a>
        <a href="{% url 'explorar' %}" class="block text-gray-700 hover:text-indigo-600 py-1">Explorar</a>
        <a href="{% url 'como-funciona' %}" class="block text-gray-700 hover:text-indigo-600 py-1">Como Funciona</a>
        <a href="{% url 'comunidade' %}" class="block text-gray-700 hover:text-indigo-600 py-1">Comunidade</a>
        {% if user.is_authenticated %}
            <a href="{% url 'perfil' %}" class="block text-indigo-600 py-1">Perfil</a>
            <a href="{% url 'logout' %}" class="block bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-center">Sair</a>
        {% else %}
            <a href="{% url 'login' %}" class="inline-block bg-indigo-600 text-white px-4 py-2 rounded-full text-center">Entrar</a>
        {% endif %}
    </div>
</nav>
